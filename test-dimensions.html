<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dimensions Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <h1>テスト：新しい寸法表示</h1>

    <div style="margin: 20px 0; padding: 20px; background: #fff; border: 1px solid #e5e5e5; border-radius: 8px;">
        <h3
            style="font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; color: #1a1a1a;">
            📏 サイズ / Dimensions</h3>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
            <div style="text-align: center; padding: 15px; background: #fafafa; border-radius: 8px;">
                <div
                    style="font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">
                    高さ / Height</div>
                <div style="font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px;">16cm</div>
                <div style="font-size: 14px; color: #666;">6.30 inches</div>
            </div>
            <div style="text-align: center; padding: 15px; background: #fafafa; border-radius: 8px;">
                <div
                    style="font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">
                    幅 / Width</div>
                <div style="font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px;">30cm</div>
                <div style="font-size: 14px; color: #666;">11.81 inches</div>
            </div>
            <div style="text-align: center; padding: 15px; background: #fafafa; border-radius: 8px;">
                <div
                    style="font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">
                    奥行 / Depth</div>
                <div style="font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px;">10cm</div>
                <div style="font-size: 14px; color: #666;">3.94 inches</div>
            </div>
        </div>
    </div>

    <p style="margin-top: 40px; padding: 20px; background: #f0f7ff; border-radius: 8px;">
        <strong>このテストページで新しいデザインを確認できます。</strong><br>
        もし上記のように表示されていれば、デザインは正しく動作しています。
    </p>
</body>

</html>
