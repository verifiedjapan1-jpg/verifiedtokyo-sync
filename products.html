                let currentProducts = [...allProducts];

                // Display products
                function displayProducts(products) {
                        const grid = document.getElementById('products-grid');
                        const count = document.getElementById('product-count');

                        count.textContent = `Total ${products.length} items`;

                        grid.innerHTML = products.map(product => `
                <div class="product-card" onclick="window.location.href='product-detail.html?id=${product.id}'">
                    <img src="${product.imageUrl}" 
                         alt="${product.name}" 
                         class="product-image"
                         onerror="this.src='images/placeholder.jpg'">
                    <div class="product-info">
                        <div class="product-brand">${product.brand}</div>
                        <div style="font-size: 10px; color: #999; margin: 2px 0;">ID: ${product.id}</div>
                        <h3 class="product-title">${product.name}</h3>
                        <div class="product-condition">${product.conditionText}</div>
                        <div class="product-price">$${Math.ceil(product.price)}</div>
                    </div>
                </div>
            `).join('');
                }

                // Initialize filters
                function initFilters() {
                        const brands = [...new Set(allProducts.map(p => p.brand))].sort();
                        const brandFilter = document.getElementById('brand-filter');

                        brands.forEach(brand => {
                                const option = document.createElement('option');
                                option.value = brand;
                                option.textContent = brand;
                                brandFilter.appendChild(option);
                        });

                        // Brand filter
                        brandFilter.addEventListener('change', filterProducts);

                        // Sort filter
                        document.getElementById('sort-filter').addEventListener('change', sortProducts);
                }

                function filterProducts() {
                        const brand = document.getElementById('brand-filter').value;

                        currentProducts = brand
                                ? allProducts.filter(p => p.brand === brand)
                                : [...allProducts];

                        sortProducts();
                }

                function sortProducts() {
                        const sort = document.getElementById('sort-filter').value;

                        switch (sort) {
                                case 'price-low':
                                        currentProducts.sort((a, b) => a.price - b.price);
                                        break;
                                case 'price-high':
                                        currentProducts.sort((a, b) => b.price - a.price);
                                        break;
                                case 'brand':
                                        currentProducts.sort((a, b) => a.brand.localeCompare(b.brand));
                                        break;
                        }

                        displayProducts(currentProducts);
                }

                // Initialize on page load
                document.addEventListener('DOMContentLoaded', () => {
                        console.log(`Loaded ${allProducts.length} products`);
                        displayProducts(currentProducts);
                        initFilters();

                        // Check for brand parameter in URL
                        const urlParams = new URLSearchParams(window.location.search);
                        const brandParam = urlParams.get('brand');

                        if (brandParam) {
                                // Set the brand filter dropdown to the URL parameter value
                                const brandFilter = document.getElementById('brand-filter');
                                brandFilter.value = brandParam;
                                // Trigger the filter
                                filterProducts();
                        }
                });
        </script>
