<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Products | Verified Tokyo | Secondhand Brand Bags Online Store</title>
        <meta name="description"
                content="Verified Tokyo's list of secondhand brand bags. We offer a wide selection of popular brand bags including LOUIS VUITTON, CHANEL, GUCCI, and HERMES.">
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;600&display=swap"
                rel="stylesheet">

        <style>
                .products-container {
                        max-width: 1400px;
                        margin: 0 auto;
                        padding: 20px;
                }

                .products-grid {
                        display: grid;
                        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                        gap: 30px;
                        margin-top: 30px;
                }

                .product-card {
                        border: 1px solid #e0e0e0;
                        border-radius: 8px;
                        overflow: hidden;
                        cursor: pointer;
                        transition: transform 0.3s, box-shadow 0.3s;
                }

                .product-card:hover {
                        transform: translateY(-5px);
                        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
                }

                .product-image {
                        width: 100%;
                        height: 300px;
                        object-fit: cover;
                }

                .product-info {
                        padding: 15px;
                }

                .product-brand {
                        font-size: 12px;
                        color: #666;
                        text-transform: uppercase;
                        letter-spacing: 1px;
                }

                .product-title {
                        font-size: 16px;
                        margin: 8px 0;
                        color: #333;
                }

                .product-price {
                        font-size: 20px;
                        font-weight: 700;
                        color: #000;
                        margin-top: 10px;
                }

                .product-condition {
                        font-size: 12px;
                        color: #888;
                        margin-top: 5px;
                }

                .filters {
                        margin: 20px 0;
                        display: flex;
                        gap: 15px;
                        flex-wrap: wrap;
                }

                .filter-select {
                        padding: 10px 15px;
                        border: 1px solid #ddd;
                        border-radius: 5px;
                        font-size: 14px;
                }
        </style>
</head>

<body>
        <header class="header">
                <div class="main-header">
                        <div class="container">
                                <div class="logo-nav-container">
                                        <h1 class="logo">Verified Tokyo</h1>
                                        <nav class="main-nav">
                                                <a href="index.html" class="nav-link">Home</a>
                                                <a href="products.html" class="nav-link active">Products</a>
                                                <a href="shopping-guide.html" class="nav-link">Shopping Guide</a>
                                                <a href="contact.html" class="nav-link">Contact</a>
                                        </nav>
                                </div>
                                <div class="search-container">
                                        <input type="text" class="search-input" id="search-input"
                                                placeholder="Search products...">
                                        <div class="search-icon" onclick="performSearch()">
                                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                                                        stroke="currentColor" stroke-width="2">
                                                        <circle cx="11" cy="11" r="8" />
                                                        <path d="M21 21l-4.35-4.35" />
                                                </svg>
                                        </div>
                                </div>
                                <div class="mobile-menu-toggle" id="mobile-menu-toggle">
                                        <span></span>
                                        <span></span>
                                        <span></span>
                                </div>
                        </div>
                </div>
        </header>

        <div class="mobile-overlay" id="mobile-overlay"></div>
        <nav class="mobile-nav" id="mobile-nav">
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="shopping-guide.html">Shopping Guide</a>
                <a href="contact.html">Contact</a>
        </nav>

        <div class="products-container">
                <h1>All Products</h1>
                <p id="product-count">Loading products...</p>

                <div class="filters">
                        <select class="filter-select" id="brand-filter">
                                <option value="">All Brands</option>
                        </select>
                        <select class="filter-select" id="sort-filter">
                                <option value="default">Default</option>
                                <option value="price-low">Price: Low to High</option>
                                <option value="price-high">Price: High to Low</option>
                                <option value="brand">Brand</option>
                        </select>
                </div>

                <div class="products-grid" id="products-grid"></div>
        </div>

        <footer style="background: white; padding: 60px 0; border-top: 1px solid #e5e5e5;">
                <div style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px;">
                                <div>
                                        <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 20px;">Verified Tokyo</h3>
                                        <p style="color: #666; line-height: 1.6;">Premium secondhand luxury bags from Tokyo</p>
                                </div>
                                <div>
                                        <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 15px;">Quick Links</h4>
                                        <ul style="list-style: none; padding: 0;">
                                                <li style="margin-bottom: 10px;"><a href="index.html" style="color: #666; text-decoration: none;">Home</a></li>
                                                <li style="margin-bottom: 10px;"><a href="products.html" style="color: #666; text-decoration: none;">Products</a></li>
                                                <li style="margin-bottom: 10px;"><a href="shopping-guide.html" style="color: #666; text-decoration: none;">Shopping Guide</a></li>
                                                <li style="margin-bottom: 10px;"><a href="contact.html" style="color: #666; text-decoration: none;">Contact</a></li>
                                        </ul>
                                </div>
                                <div style="text-align: right;">
                                        <img src="images/payment-methods.png" alt="Accepted Payment Methods"
                                                style="max-width: 300px; height: auto;">
                                </div>
                        </div>
                        <div style="text-align: center; padding-top: 20px; border-top: 1px solid #e5e5e5; margin-top: 40px;">
                                <p style="font-size: 14px; color: #666;">&copy; 2026 Verified Tokyo. All rights reserved.</p>
                        </div>
                </div>
        </footer>

        <script>
                let allProducts = [];
                let currentProducts = [];

                fetch('products_data.json')
                    .then(res => res.json())
                    .then(data => {
                        allProducts = data;
                        currentProducts = [...allProducts];
                        displayProducts(currentProducts);
                        initFilters();

                        const urlParams = new URLSearchParams(window.location.search);
                        const brandParam = urlParams.get('brand');
                        const searchParam = urlParams.get('search');

                        if (brandParam) {
                            document.getElementById('brand-filter').value = brandParam;
                            filterProducts();
                        }
                        if (searchParam) {
                            document.getElementById('search-input').value = searchParam;
                            filterProductsBySearch(searchParam);
                        }
                    })
                    .catch(err => {
                        document.getElementById('product-count').textContent = 'Failed to load products.';
                        console.error(err);
                    });

                function displayProducts(products) {
                        const grid = document.getElementById('products-grid');
                        const count = document.getElementById('product-count');
                        count.textContent = `Total ${products.length} items`;
                        grid.innerHTML = products.map(product => `
                            <div class="product-card" onclick="window.location.href='product-detail.html?id=${product.productId}'">
                                <img src="${product.imageUrl}"
                                     alt="${product.name}"
                                     class="product-image"
                                     onerror="this.src='images/placeholder.jpg'">
                                <div class="product-info">
                                    <div class="product-brand">${product.brand}</div>
                                    <h3 class="product-title">${product.name}</h3>
                                    <div class="product-condition">${product.conditionText || ''}</div>
                                    <div class="product-price">$${Math.ceil(product.price)}</div>
                                </div>
                            </div>
                        `).join('');
                }

                function initFilters() {
                        const brands = [...new Set(allProducts.map(p => p.brand))].sort();
                        const brandFilter = document.getElementById('brand-filter');
                        brands.forEach(brand => {
                                const option = document.createElement('option');
                                option.value = brand;
                                option.textContent = brand;
                                brandFilter.appendChild(option);
                        });
                        brandFilter.addEventListener('change', filterProducts);
                        document.getElementById('sort-filter').addEventListener('change', sortProducts);
                }

                function filterProducts() {
                        const brand = document.getElementById('brand-filter').value;
                        currentProducts = brand
                                ? allProducts.filter(p => p.brand === brand)
                                : [...allProducts];
                        sortProducts();
                }

                function sortProducts() {
                        const sort = document.getElementById('sort-filter').value;
                        if (sort === 'price-low') currentProducts.sort((a, b) => a.price - b.price);
                        else if (sort === 'price-high') currentProducts.sort((a, b) => b.price - a.price);
                        else if (sort === 'brand') currentProducts.sort((a, b) => a.brand.localeCompare(b.brand));
                        displayProducts(currentProducts);
                }

                function performSearch() {
                        const searchTerm = document.getElementById('search-input').value.trim();
                        if (searchTerm) {
                                window.location.href = `products.html?search=${encodeURIComponent(searchTerm)}`;
                        } else {
                                window.location.href = 'products.html';
                        }
                }

                function filterProductsBySearch(searchTerm) {
                        const lower = searchTerm.toLowerCase();
                        currentProducts = allProducts.filter(p =>
                                (p.brand || '').toLowerCase().includes(lower) ||
                                (p.name || '').toLowerCase().includes(lower)
                        );
                        displayProducts(currentProducts);
                }

                document.addEventListener('DOMContentLoaded', function () {
                        const menuToggle = document.getElementById('mobile-menu-toggle');
                        const mobileNav = document.getElementById('mobile-nav');
                        const overlay = document.getElementById('mobile-overlay');
                        if (menuToggle) {
                                menuToggle.addEventListener('click', function () {
                                        menuToggle.classList.toggle('active');
                                        mobileNav.classList.toggle('active');
                                        overlay.classList.toggle('active');
                                        document.body.style.overflow = mobileNav.classList.contains('active') ? 'hidden' : '';
                                });
                        }
                        if (overlay) {
                                overlay.addEventListener('click', function () {
                                        menuToggle.classList.remove('active');
                                        mobileNav.classList.remove('active');
                                        overlay.classList.remove('active');
                                        document.body.style.overflow = '';
                                });
                        }

                        const searchInput = document.getElementById('search-input');
                        if (searchInput) {
                                searchInput.addEventListener('keypress', function (e) {
                                        if (e.key === 'Enter') performSearch();
                                });
                        }
                });
        </script>
</body>

</html>
